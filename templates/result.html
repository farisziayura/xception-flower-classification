{% extends 'base.html' %}

{% block title %}
Prediction Result
{% endblock %}

{% block content %}

<div class="main-wrapper">

<div class="upload-card">

<div class="logo">

<i class="bi bi-patch-check-fill"></i>

</div>

<h1>Prediction Result</h1>

<p class="subtitle">

XCeption successfully classified your image

</p>

<img
src="{{ url_for('static', filename='uploads/' + image) }}"
class="result-image">

<h2 class="flower-name">

🌸 {{ flower }}

</h2>

<p class="confidence-text">

Confidence

</p>

<div class="progress confidence-bar">

<div
class="progress-bar bg-success"
role="progressbar"
style="width: {{ confidence }}%;">

{{ confidence }}%

</div>

</div>

<a
href="/"
class="btn btn-outline-primary btn-lg w-100 mt-4">

<i class="bi bi-arrow-left-circle"></i>

Predict Another Image

</a>

</div>

<div class="footer">

Developed by <strong>Muhammad Faris</strong>

<br>

Universitas Bale Bandung

</div>

</div>

{% endblock %}
